project:
  name: thesis-benchmarking-project
  phase: 9
  description: Neuro-symbolic architecture benchmarking platform

paths:
  data_root: data
  raw_data_root: data/raw
  processed_data_root: data/processed
  external_root: external
  results_root: results
  runs_root: results/runs
  summaries_root: results/summaries
  plots_root: results/plots

defaults:
  benchmark_suite: rsbench
  dataset: mnlogic
  model_family: pipeline
  supervision: full
  seed: 42
  device: cpu

storage:
  run_registry_backend: sqlite
  sqlite_path: results/experiment_registry.sqlite3

notes:
  status: Phase 9 uses these storage paths for the run registry, per-run artifacts, and backend API access.
