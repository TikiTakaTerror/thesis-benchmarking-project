family: pipeline

shared_encoder:
  name: small_cnn
  pretrained: false
  input_channels: 3
  input_size: [64, 64]
  conv_channels: [32, 64]
  feature_dim: 128
  dropout: 0.1

heads:
  concept_head:
    hidden_dim: 64
    dropout: 0.1
  label_head:
    hidden_dim: 64
    dropout: 0.1

symbolic_layer:
  executor_type: rule-based
  rules_file: null

training_defaults:
  batch_size: null
  learning_rate: null
  max_epochs: null

notes:
  status: Shared encoder defaults added in Phase 3. The first real family implementation is planned for Phase 4.
